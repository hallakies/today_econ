name: Instagram Connection Check

on:
  workflow_dispatch:

concurrency:
  group: today-econ-writes
  cancel-in-progress: false

jobs:
  check-connection:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Validate today.econ Token Without Publishing
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_TOKEN_ENCRYPTION_KEY: ${{ secrets.INSTAGRAM_TOKEN_ENCRYPTION_KEY }}
          INSTAGRAM_USER_ID: ${{ vars.INSTAGRAM_USER_ID }}
          INSTAGRAM_API_VERSION: 'v23.0'
        run: node src/check-instagram.js --bootstrap

      - name: Commit Encrypted Token Vault
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instagram-token.enc
          if ! git diff --cached --quiet; then
            git commit -m "Enable unattended Instagram token rotation" -m "Bootstrap an AES-256-GCM encrypted token vault while keeping the encryption key in Actions secrets.\n\nConstraint: GitHub Actions cannot rewrite repository secrets with GITHUB_TOKEN\nRejected: Commit a plaintext token | public repository credential exposure\nConfidence: high\nScope-risk: narrow\nTested: Read-only today.econ profile lookup\nNot-tested: Live publishing"
            git push
          else
            echo "Encrypted token vault already exists."
          fi
