name: Instagram Growth Measurement

on:
  schedule:
    - cron: '15 */6 * * *'
  workflow_dispatch:

concurrency:
  group: today-econ-writes
  cancel-in-progress: false

jobs:
  collect-insights:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Remove Expired Temporary Instagram Assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node src/cleanup-assets.js

      - name: Collect 24h, 72h and 7d Instagram Insights
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_TOKEN_ENCRYPTION_KEY: ${{ secrets.INSTAGRAM_TOKEN_ENCRYPTION_KEY }}
          INSTAGRAM_USER_ID: ${{ vars.INSTAGRAM_USER_ID }}
          INSTAGRAM_API_VERSION: 'v23.0'
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        run: node src/collect-insights.js

      - name: Commit Measurement Snapshots
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/posts.json data/analytics-state.json
          if ! git diff --cached --quiet; then
            git commit -m "Retain Instagram growth evidence for editorial decisions" -m "Store scheduled 24-hour, 72-hour and 7-day snapshots plus weekly report state.\n\nConstraint: Use repository-owned zero-cost persistence\nConfidence: high\nScope-risk: narrow\nTested: Scheduled insight collection workflow\nNot-tested: Metric availability for newly published media"
            git push
          else
            echo "No insight snapshots were due."
          fi
