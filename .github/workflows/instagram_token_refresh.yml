name: Instagram Token Rotation

on:
  schedule:
    - cron: '30 20 * * 0'
  workflow_dispatch:

concurrency:
  group: today-econ-writes
  cancel-in-progress: false

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Refresh and Encrypt Instagram Token
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_TOKEN_ENCRYPTION_KEY: ${{ secrets.INSTAGRAM_TOKEN_ENCRYPTION_KEY }}
        run: node src/refresh-instagram-token.js

      - name: Commit Rotated Encrypted Token
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/instagram-token.enc
          if ! git diff --cached --quiet; then
            git commit -m "Keep Instagram automation authenticated without manual rotation" -m "Refresh the long-lived Instagram token and persist only its AES-256-GCM ciphertext.\n\nConstraint: Access tokens expire and GitHub Actions cannot rewrite repository secrets\nConfidence: high\nScope-risk: narrow\nTested: Token refresh endpoint and encrypted persistence\nNot-tested: Provider-side expiry beyond the returned lifetime"
            git push
          else
            echo "Token refresh did not change the encrypted payload."
          fi
