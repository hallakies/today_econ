name: Daily Economic Card News Creator

on:
  schedule:
    # Runs twice a day: 22:45 UTC (7:45 AM KST) and 10:45 UTC (7:45 PM KST) to avoid GitHub Actions peak delays
    - cron: '45 10,22 * * *'
  workflow_dispatch:
    inputs:
      publish_instagram:
        description: 'Publish the generated Reel to Instagram (uncheck for Slack-only test)'
        required: true
        default: true
        type: boolean

concurrency:
  group: today-econ-writes
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    permissions:
      # Required to commit history.json back to the repository
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Install Playwright and OS Dependencies
        run: npx playwright install --with-deps chromium

      - name: Install ffmpeg for Reel rendering
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run Card News Creator Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_TOKEN_ENCRYPTION_KEY: ${{ secrets.INSTAGRAM_TOKEN_ENCRYPTION_KEY }}
          INSTAGRAM_USER_ID: ${{ vars.INSTAGRAM_USER_ID }}
          INSTAGRAM_API_VERSION: 'v23.0'
          PUBLISH_INSTAGRAM: ${{ github.event_name == 'schedule' || inputs.publish_instagram == true }}
          INSTAGRAM_FORMAT: 'reel'
          PUBLISH_INSTAGRAM_STORY: 'true'
          INSTAGRAM_ALLOW_CAROUSEL_FALLBACK: 'true'
          REEL_DURATION_PER_SLIDE: '3'
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
          NEWS_RSS_URL: 'https://www.mk.co.kr/rss/30100041/'
          MAX_HISTORY_DAYS: '7'
        run: |
          if node src/index.js; then
            exit 0
          fi
          echo "[Recovery] First attempt failed. Starting one self-healing retry."
          PIPELINE_RECOVERY_MODE=true node src/index.js

      - name: Commit Durable Publishing Data
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.json data/posts.json data/analytics-state.json data/pipeline-state.json
          if ! git diff --cached --quiet; then
            git commit -m "Preserve Instagram publishing and measurement history" -m "Automated runs persist only durable post metadata and never temporary image assets.\n\nConstraint: Instagram requires public image URLs during ingestion\nConfidence: high\nScope-risk: narrow\nTested: GitHub Actions pipeline data persistence\nNot-tested: Live Instagram response for this run"
            git push
          else
            echo "No durable publishing data changed."
          fi
